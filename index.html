<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>inpocket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:'Bebas Neue', sans-serif;
    padding:20px 0;
  }
  h1 {
    font-size:clamp(2.5rem,10vw,5rem);
    letter-spacing:0.15em;
    background:linear-gradient(180deg,#e8e8e8 0%,#a0a0a0 30%,#d0d0d0 50%,#707070 70%,#c0c0c0 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 2px 8px rgba(0,0,0,0.8));
    margin-bottom:8px;
  }
  .sub {
    color:#444; font-size:0.7rem; letter-spacing:0.25em;
    font-family:sans-serif; margin-bottom:20px;
  }
  .stage {
    position:relative;
    width:min(420px, 92vw);
  }
  /* мқҙлҜём§Җл“Өмқҙ мӨ‘м•ҷм—җ м •л ¬лҗҳлҸ„лЎқ м»Ён…Ңмқҙл„Ҳ м„Өм • */
  .img-container {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .stage img.bg {
    width:100%; display:block; pointer-events:none;
  }
  /* м ҲлҢҖ мң„м№ҳ кё°мӨҖмқ„ м»Ён…Ңмқҙл„Ҳ мӨ‘м•ҷмңјлЎң ліҖкІҪ */
  #resultImg {
    position:absolute; 
    top: 50%; 
    left: 50%;
    transform: translate(-50%, -50%);
    width:100%; height:100%;
    z-index:1; display:none;
    object-fit: contain; /* мқҙлҜём§Җ л№„мңЁ к№Ём§җ л°©м§Җ */
  }
  .loading {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    color:#888; font-size:0.9rem; letter-spacing:0.15em;
    font-family:sans-serif; display:none; z-index:5;
  }
  .buttons {
    display:flex; gap:10px; margin-top:20px;
    flex-wrap:wrap; justify-content:center;
  }
  .btn {
    padding:13px 28px; font-family:'Bebas Neue',sans-serif;
    font-size:1rem; letter-spacing:0.15em;
    cursor:pointer; border:none; transition:opacity 0.2s;
  }
  .btn:hover { opacity:0.85; }
  .btn-upload { background:linear-gradient(180deg,#d0d0d0,#808080); color:#111; }
  .btn-save, .btn-reset {
    background:transparent; border:1px solid #555; color:#aaa; display:none;
  }
  #fileInput { display:none; }
  /* мҲЁкІЁм§„ img нғңк·ёл“Ө - canvasмҡ© */
  #hiddenOverlay, #hiddenUser { display:none; }
</style>
</head>
<body>

<h1>INPOCKET</h1>
<p class="sub">DROP YOUR PHOTO INTO THE SCREEN</p>

<!-- canvas н•©м„ұмҡ© мҲЁкёҙ мқҙлҜём§Җл“Ө -->
<img id="hiddenOverlay" src="мғҒлӢЁ_л·°.png" crossorigin="anonymous">
<img id="hiddenUser" src="" crossorigin="anonymous">

<div class="stage">
  <div style="position: relative; width: 100%; display: flex; justify-content: center; align-items: center;">
    <img class="bg" src="мғҒлӢЁ_л·°.png">    <img id="resultImg" src="">
  </div>
  <div class="loading" id="loading">LOADING...</div>
</div>

<input type="file" id="fileInput" accept="image/*">
<div class="buttons">
  <button class="btn btn-upload" id="uploadBtn">+ мӮ¬м§„ м„ нғқ</button>
  <button class="btn btn-save" id="saveBtn">м ҖмһҘн•ҳкё°</button>
  <button class="btn btn-reset" id="resetBtn">мҙҲкё°нҷ”</button>
</div>

<script>
const OW=896, OH=1198;
const SCREEN={x:356, y:433, w:213, h:318};

const fileInput   = document.getElementById('fileInput');
const uploadBtn   = document.getElementById('uploadBtn');
const saveBtn     = document.getElementById('saveBtn');
const resetBtn    = document.getElementById('resetBtn');
const resultImg   = document.getElementById('resultImg');
const loading     = document.getElementById('loading');
const hiddenUser  = document.getElementById('hiddenUser');
const hiddenOverlay = document.getElementById('hiddenOverlay');

uploadBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  loading.style.display = 'block';
  uploadBtn.disabled = true;

  const reader = new FileReader();
  reader.onload = ev => {
    hiddenUser.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = OW;
      canvas.height = OH;
      const ctx = canvas.getContext('2d');

      // мӮ¬мҡ©мһҗ мӮ¬м§„мқҙ л“Өм–ҙк°ҖлҠ” м „мІҙ нҷ”л©ҙ мҳҒм—ӯ
      const FS = {x:352, y:428, w:226, h:560};

      // 1. мӮ¬мҡ©мһҗ мӮ¬м§„мқ„ FS мҳҒм—ӯм—җ cover fitмңјлЎң к·ёлҰ¬кё°
      const pa = hiddenUser.naturalWidth / hiddenUser.naturalHeight;
      const fa = FS.w / FS.h;
      let dw, dh, dx, dy;
      if (pa > fa) {
        dh = FS.h; dw = dh * pa;
        dx = FS.x + (FS.w - dw) / 2; dy = FS.y;
      } else {
        dw = FS.w; dh = dw / pa;
        dx = FS.x; dy = FS.y + (FS.h - dh) / 2;
      }
      ctx.save();
      ctx.beginPath();
      ctx.rect(FS.x, FS.y, FS.w, FS.h);
      ctx.clip();
      ctx.drawImage(hiddenUser, dx, dy, dw, dh);
      ctx.restore();

      // 2. мғҒлӢЁ_л·° PNGлҘј к·ёлҢҖлЎң мң„м—җ лҚ®кё° (м•ҢнҢҢмұ„л„җлЎң нҷ”л©ҙ мҳҒм—ӯмқҙ мһҗм—°мҠӨлҹҪкІҢ лҡ«лҰј)
      ctx.drawImage(hiddenOverlay, 0, 0, OW, OH);


      const dataURL = canvas.toDataURL('image/png');
      resultImg.src = dataURL;
      resultImg.style.display = 'block';
      loading.style.display = 'none';
      uploadBtn.disabled = false;
      saveBtn.style.display = 'block';
      resetBtn.style.display = 'block';
      saveBtn.dataset.url = dataURL;
    };
    hiddenUser.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  this.value = '';
});

saveBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'inpocket.png';
  link.href = saveBtn.dataset.url;
  link.click();
});

resetBtn.addEventListener('click', () => {
  resultImg.style.display = 'none';
  resultImg.src = '';
  saveBtn.style.display = 'none';
  resetBtn.style.display = 'none';
});
</script>
</body>
</html>
