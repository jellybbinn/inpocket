<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>inpocket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:'Bebas Neue', sans-serif;
    padding:20px 0;
  }
  h1 {
    font-size:clamp(2.5rem,10vw,5rem);
    letter-spacing:0.15em;
    background:linear-gradient(180deg,#e8e8e8 0%,#a0a0a0 30%,#d0d0d0 50%,#707070 70%,#c0c0c0 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 2px 8px rgba(0,0,0,0.8));
    margin-bottom:8px;
  }
  .sub {
    color:#444;
    font-size:0.7rem;
    letter-spacing:0.25em;
    font-family:sans-serif;
    margin-bottom:20px;
  }
  .stage {
    position:relative;
    width:min(420px, 92vw);
    touch-action:none;
    user-select:none;
  }
  .stage-size { width:100%; display:block; visibility:hidden; }
  .layer {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
  }
  #canvasUser { z-index:1; }
  #layerTop   { z-index:2; }
  #touchLayer {
    position:absolute;
    top:0; left:0; width:100%; height:100%;
    z-index:3;
    cursor:grab;
  }
  .buttons {
    display:flex;
    gap:10px;
    margin-top:20px;
  }
  .btn {
    padding:13px 28px;
    font-family:'Bebas Neue',sans-serif;
    font-size:1rem;
    letter-spacing:0.15em;
    cursor:pointer;
    border:none;
    transition:opacity 0.2s;
  }
  .btn:hover { opacity:0.85; }
  .btn-upload {
    background:linear-gradient(180deg,#d0d0d0,#808080);
    color:#111;
  }
  .btn-save, .btn-reset {
    background:transparent;
    border:1px solid #555;
    color:#aaa;
    display:none;
  }
  .hint {
    color:#333;
    font-size:0.7rem;
    letter-spacing:0.08em;
    margin-top:10px;
    font-family:sans-serif;
    display:none;
  }
  #fileInput { display:none; }
</style>
</head>
<body>

<input type="file" id="fileInput" accept="image/*">
<div class="buttons">
  <button class="btn btn-upload" id="uploadBtn">+ 사진 선택</button>
  <button class="btn btn-save"   id="saveBtn">저장하기</button>

<script>
const OW = 896, OH = 1198;
// 화면 영역 비율
const SR = { x: 356/896, y: 433/1198, w: 213/896, h: 318/1198 };
const RR = 20/896; // 모서리 반경 비율

const stage      = document.getElementById('stage');
const canvas     = document.getElementById('canvasUser');
const ctx        = canvas.getContext('2d');
const touchLayer = document.getElementById('touchLayer');
const fileInput  = document.getElementById('fileInput');
const uploadBtn  = document.getElementById('uploadBtn');
const saveBtn    = document.getElementById('saveBtn');
const resetBtn   = document.getElementById('resetBtn');
const hint       = document.getElementById('hint');
const layerTop   = document.getElementById('layerTop');

let userImg = null;
let photo = { x:0, y:0, scale:1 };
let dragging = false, dragStart = {};
let lastPinchDist = null;

function getScreen() {
  const cw = canvas.width, ch = canvas.height;
  return { x:SR.x*cw, y:SR.y*ch, w:SR.w*cw, h:SR.h*ch, r:RR*cw };
}

function syncCanvas() {
  const rect = stage.getBoundingClientRect();
  canvas.width  = Math.round(rect.width);
  canvas.height = Math.round(rect.height);
}

function drawUser() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!userImg) return;
  const s = getScreen();
  ctx.save();
  // 둥근 클리핑
  ctx.beginPath();
  ctx.moveTo(s.x+s.r, s.y);
  ctx.lineTo(s.x+s.w-s.r, s.y);
  ctx.quadraticCurveTo(s.x+s.w, s.y, s.x+s.w, s.y+s.r);
  ctx.lineTo(s.x+s.w, s.y+s.h-s.r);
  ctx.quadraticCurveTo(s.x+s.w, s.y+s.h, s.x+s.w-s.r, s.y+s.h);
  ctx.lineTo(s.x+s.r, s.y+s.h);
  ctx.quadraticCurveTo(s.x, s.y+s.h, s.x, s.y+s.h-s.r);
  ctx.lineTo(s.x, s.y+s.r);
  ctx.quadraticCurveTo(s.x, s.y, s.x+s.r, s.y);
  ctx.closePath();
  ctx.clip();
  ctx.drawImage(userImg, photo.x, photo.y,
    userImg.naturalWidth * photo.scale,
    userImg.naturalHeight * photo.scale
  );
  ctx.restore();
}

function initPhoto(img) {
  syncCanvas();
  const s = getScreen();
  const pa = img.naturalWidth / img.naturalHeight;
  const sa = s.w / s.h;
  let iw, ih;
  if (pa > sa) { ih = s.h; iw = ih * pa; }
  else          { iw = s.w; ih = iw / pa; }
  photo.scale = iw / img.naturalWidth;
  photo.x = s.x + s.w/2 - iw/2;
  photo.y = s.y + s.h/2 - ih/2;
}

window.addEventListener('load', () => { syncCanvas(); drawUser(); });
window.addEventListener('resize', () => {
  if (!userImg) { syncCanvas(); return; }
  const oldW = canvas.width;
  syncCanvas();
  const ratio = canvas.width / oldW;
  photo.x *= ratio; photo.y *= ratio; photo.scale *= ratio;
  drawUser();
});

uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      userImg = img;
      initPhoto(img);
      drawUser();
      saveBtn.style.display = resetBtn.style.display = hint.style.display = 'block';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  this.value = '';
});

// 마우스
touchLayer.addEventListener('mousedown', e => {
  if (!userImg) return;
  dragging = true;
  touchLayer.style.cursor = 'grabbing';
  dragStart = { mx:e.clientX, my:e.clientY, px:photo.x, py:photo.y };
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  photo.x = dragStart.px + (e.clientX - dragStart.mx);
  photo.y = dragStart.py + (e.clientY - dragStart.my);
  drawUser();
});
window.addEventListener('mouseup', () => { dragging=false; touchLayer.style.cursor='grab'; });

// 휠
touchLayer.addEventListener('wheel', e => {
  if (!userImg) return;
  const d = e.deltaY > 0 ? 0.92 : 1.08;
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX-rect.left, cy = e.clientY-rect.top;
  photo.x = cx-(cx-photo.x)*d; photo.y = cy-(cy-photo.y)*d;
  photo.scale *= d;
  drawUser(); e.preventDefault();
}, {passive:false});

// 터치
touchLayer.addEventListener('touchstart', e => {
  if (!userImg) return;
  if (e.touches.length===1) {
    dragging = true;
    dragStart = { mx:e.touches[0].clientX, my:e.touches[0].clientY, px:photo.x, py:photo.y };
  }
}, {passive:true});
touchLayer.addEventListener('touchmove', e => {
  if (!userImg) return;
  if (e.touches.length===1 && dragging) {
    photo.x = dragStart.px+(e.touches[0].clientX-dragStart.mx);
    photo.y = dragStart.py+(e.touches[0].clientY-dragStart.my);
    drawUser();
  } else if (e.touches.length===2) {
    dragging = false;
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if (lastPinchDist!==null) {
      const d=dist/lastPinchDist;
      const rect=canvas.getBoundingClientRect();
      const cx=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;
      const cy=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top;
      photo.x=cx-(cx-photo.x)*d; photo.y=cy-(cy-photo.y)*d;
      photo.scale*=d; drawUser();
    }
    lastPinchDist=dist;
  }
  e.preventDefault();
}, {passive:false});
touchLayer.addEventListener('touchend', ()=>{ dragging=false; lastPinchDist=null; });

// 저장
saveBtn.addEventListener('click', () => {
  const sc=document.createElement('canvas');
  sc.width=OW; sc.height=OH;
  const sCtx=sc.getContext('2d');
  const ratio=OW/canvas.width;

  // 사용자 사진
  if (userImg) {
    sCtx.save();
    const sx=SR.x*OW, sy=SR.y*OH, sw=SR.w*OW, sh=SR.h*OH, r=RR*OW;
    sCtx.beginPath();
    sCtx.moveTo(sx+r,sy); sCtx.lineTo(sx+sw-r,sy);
    sCtx.quadraticCurveTo(sx+sw,sy,sx+sw,sy+r);
    sCtx.lineTo(sx+sw,sy+sh-r);
    sCtx.quadraticCurveTo(sx+sw,sy+sh,sx+sw-r,sy+sh);
    sCtx.lineTo(sx+r,sy+sh);
    sCtx.quadraticCurveTo(sx,sy+sh,sx,sy+sh-r);
    sCtx.lineTo(sx,sy+r);
    sCtx.quadraticCurveTo(sx,sy,sx+r,sy);
    sCtx.closePath();
    sCtx.clip();
    sCtx.drawImage(userImg,
      photo.x*ratio, photo.y*ratio,
      userImg.naturalWidth*photo.scale*ratio,
      userImg.naturalHeight*photo.scale*ratio
    );
    sCtx.restore();
  }

  // 상단 레이어
  sCtx.drawImage(layerTop, 0, 0, OW, OH);

  const link=document.createElement('a');
  link.download='inpocket.png';
  link.href=sc.toDataURL('image/png');
  link.click();
});

resetBtn.addEventListener('click', ()=>{
  userImg=null; photo={x:0,y:0,scale:1}; drawUser();
  saveBtn.style.display=resetBtn.style.display=hint.style.display='none';
});
</script>
</body>
</html>
