<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>inpocket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:'Bebas Neue', sans-serif;
  }
  h1 {
    font-size:clamp(2.5rem,10vw,5rem);
    letter-spacing:0.15em;
    background:linear-gradient(180deg,#e8e8e8 0%,#a0a0a0 30%,#d0d0d0 50%,#707070 70%,#c0c0c0 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 2px 8px rgba(0,0,0,0.8));
    margin-bottom:8px;
  }
  .sub {
    color:#444;
    font-size:0.7rem;
    letter-spacing:0.25em;
    font-family:sans-serif;
    margin-bottom:20px;
  }
  .stage {
    position:relative;
    width:min(400px,90vw);
    touch-action:none;
  }
  .stage-size {
    width:100%;
    display:block;
    visibility:hidden;
  }
  /* 캔버스 레이어: 사용자 사진만 */
  #canvasUser {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    z-index:2;
    pointer-events:none;
  }
  /* 배경 레이어 (full) */
  #layerFull {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    z-index:1;
    pointer-events:none;
  }
  /* 상단 오버레이 (손 가리는 레이어) */
  #layerTop {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    z-index:3;
    pointer-events:none;
  }
  /* 터치/클릭 받는 투명 레이어 */
  #touchLayer {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    z-index:4;
    cursor:grab;
  }
  .buttons {
    display:flex;
    gap:10px;
    margin-top:20px;
  }
  .btn {
    padding:13px 28px;
    font-family:'Bebas Neue',sans-serif;
    font-size:1rem;
    letter-spacing:0.15em;
    cursor:pointer;
    border:none;
    transition:opacity 0.2s;
  }
  .btn:hover { opacity:0.85; }
  .btn-upload {
    background:linear-gradient(180deg,#d0d0d0,#808080);
    color:#111;
  }
  .btn-save {
    background:transparent;
    border:1px solid #555;
    color:#aaa;
    display:none;
  }
  .btn-reset {
    background:transparent;
    border:1px solid #444;
    color:#666;
    display:none;
  }
  .hint {
    color:#333;
    font-size:0.7rem;
    letter-spacing:0.1em;
    margin-top:10px;
    font-family:sans-serif;
    display:none;
  }
  #fileInput { display:none; }
</style>
</head>
<body>

<input type="file" id="fileInput" accept="image/*">
<div class="buttons">
  <button class="btn btn-upload" id="uploadBtn">+ 사진 선택</button>
  <button class="btn btn-save" id="saveBtn">저장하기</button>
  <button class="btn btn-reset" id="resetBtn">초기화</button>
</div>
<p class="hint" id="hint">드래그로 위치 · 스크롤/핀치로 크기 조정</p>

<script>
const fileInput  = document.getElementById('fileInput');
const uploadBtn  = document.getElementById('uploadBtn');
const saveBtn    = document.getElementById('saveBtn');
const resetBtn   = document.getElementById('resetBtn');
const hint       = document.getElementById('hint');
const stage      = document.getElementById('stage');
const canvas     = document.getElementById('canvasUser');
const ctx        = canvas.getContext('2d');
const touchLayer = document.getElementById('touchLayer');

const OW = 896, OH = 1198;
// 포토샵 측정 좌표 (사진_전체_범위 기준)
const SCREEN = { x:352, y:428, w:226, h:462 };
const RADIUS = 20;

const fullImg = new Image();
fullImg.src = document.getElementById('layerFull').src;

let userImg = null;
let photo = { x:0, y:0, scale:1 };
let dragging = false, dragStart = {};
let lastPinchDist = null;

function resizeCanvas() {
  canvas.width  = stage.offsetWidth;
  canvas.height = stage.offsetHeight;
  drawUser();
}

window.addEventListener('load', resizeCanvas);
window.addEventListener('resize', resizeCanvas);

function drawUser() {
  const cw = canvas.width, ch = canvas.height;
  ctx.clearRect(0, 0, cw, ch);
  if (!userImg) return;

  const ratio = cw / OW;
  const sx = SCREEN.x * ratio;
  const sy = SCREEN.y * ratio;
  const sw = SCREEN.w * ratio;
  const sh = SCREEN.h * ratio;
  const r  = RADIUS * ratio;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(sx+r, sy);
  ctx.lineTo(sx+sw-r, sy);
  ctx.quadraticCurveTo(sx+sw, sy, sx+sw, sy+r);
  ctx.lineTo(sx+sw, sy+sh-r);
  ctx.quadraticCurveTo(sx+sw, sy+sh, sx+sw-r, sy+sh);
  ctx.lineTo(sx+r, sy+sh);
  ctx.quadraticCurveTo(sx, sy+sh, sx, sy+sh-r);
  ctx.lineTo(sx, sy+r);
  ctx.quadraticCurveTo(sx, sy, sx+r, sy);
  ctx.closePath();
  ctx.clip();

  const pw = userImg.naturalWidth  * photo.scale;
  const ph = userImg.naturalHeight * photo.scale;
  ctx.drawImage(userImg, photo.x, photo.y, pw, ph);
  ctx.restore();
}

uploadBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      userImg = img;
      const ratio = canvas.width / OW;
      const sx = SCREEN.x * ratio;
      const sy = SCREEN.y * ratio;
      const sw = SCREEN.w * ratio;
      const sh = SCREEN.h * ratio;
      const pa = img.naturalWidth / img.naturalHeight;
      const sa = sw / sh;
      let initW, initH;
      if (pa > sa) { initH = sh; initW = initH * pa; }
      else         { initW = sw; initH = initW / pa; }
      photo.scale = initW / img.naturalWidth;
      photo.x = sx + sw/2 - initW/2;
      photo.y = sy + sh/2 - initH/2;
      drawUser();
      saveBtn.style.display  = 'block';
      resetBtn.style.display = 'block';
      hint.style.display     = 'block';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  this.value = '';
});

// 마우스
touchLayer.addEventListener('mousedown', e => {
  if (!userImg) return;
  dragging = true;
  touchLayer.style.cursor = 'grabbing';
  dragStart = { mx:e.clientX, my:e.clientY, px:photo.x, py:photo.y };
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  photo.x = dragStart.px + (e.clientX - dragStart.mx);
  photo.y = dragStart.py + (e.clientY - dragStart.my);
  drawUser();
});
window.addEventListener('mouseup', () => { dragging=false; touchLayer.style.cursor='grab'; });

// 휠
touchLayer.addEventListener('wheel', e => {
  if (!userImg) return;
  const delta = e.deltaY > 0 ? 0.92 : 1.08;
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  photo.x = cx - (cx - photo.x) * delta;
  photo.y = cy - (cy - photo.y) * delta;
  photo.scale *= delta;
  drawUser();
  e.preventDefault();
}, {passive:false});

// 터치
touchLayer.addEventListener('touchstart', e => {
  if (!userImg) return;
  if (e.touches.length === 1) {
    dragging = true;
    dragStart = { mx:e.touches[0].clientX, my:e.touches[0].clientY, px:photo.x, py:photo.y };
  }
}, {passive:true});
touchLayer.addEventListener('touchmove', e => {
  if (!userImg) return;
  if (e.touches.length === 1 && dragging) {
    photo.x = dragStart.px + (e.touches[0].clientX - dragStart.mx);
    photo.y = dragStart.py + (e.touches[0].clientY - dragStart.my);
    drawUser();
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastPinchDist !== null) {
      const delta = dist / lastPinchDist;
      const rect = canvas.getBoundingClientRect();
      const cx = (e.touches[0].clientX + e.touches[1].clientX)/2 - rect.left;
      const cy = (e.touches[0].clientY + e.touches[1].clientY)/2 - rect.top;
      photo.x = cx - (cx - photo.x) * delta;
      photo.y = cy - (cy - photo.y) * delta;
      photo.scale *= delta;
      drawUser();
    }
    lastPinchDist = dist;
  }
  e.preventDefault();
}, {passive:false});
touchLayer.addEventListener('touchend', () => { dragging=false; lastPinchDist=null; });

// 저장
saveBtn.addEventListener('click', () => {
  const sc = document.createElement('canvas');
  sc.width = OW; sc.height = OH;
  const sCtx = sc.getContext('2d');

  // 1. 배경
  sCtx.drawImage(fullImg, 0, 0, OW, OH);

  // 2. 사용자 사진 클리핑
  if (userImg) {
    const ratio = OW / canvas.width;
    sCtx.save();
    const sx=SCREEN.x, sy=SCREEN.y, sw=SCREEN.w, sh=SCREEN.h, r=RADIUS;
    sCtx.beginPath();
    sCtx.moveTo(sx+r,sy); sCtx.lineTo(sx+sw-r,sy);
    sCtx.quadraticCurveTo(sx+sw,sy,sx+sw,sy+r);
    sCtx.lineTo(sx+sw,sy+sh-r);
    sCtx.quadraticCurveTo(sx+sw,sy+sh,sx+sw-r,sy+sh);
    sCtx.lineTo(sx+r,sy+sh);
    sCtx.quadraticCurveTo(sx,sy+sh,sx,sy+sh-r);
    sCtx.lineTo(sx,sy+r);
    sCtx.quadraticCurveTo(sx,sy,sx+r,sy);
    sCtx.closePath();
    sCtx.clip();
    sCtx.drawImage(userImg,
      photo.x*ratio, photo.y*ratio,
      userImg.naturalWidth*photo.scale*ratio,
      userImg.naturalHeight*photo.scale*ratio
    );
    sCtx.restore();
  }

  // 3. 상단 레이어
  sCtx.drawImage(document.getElementById('layerTop'), 0, 0, OW, OH);

  const link = document.createElement('a');
  link.download = 'inpocket.png';
  link.href = sc.toDataURL('image/png');
  link.click();
});

resetBtn.addEventListener('click', () => {
  userImg = null;
  photo = { x:0, y:0, scale:1 };
  drawUser();
  saveBtn.style.display  = 'none';
  resetBtn.style.display = 'none';
  hint.style.display     = 'none';
});
</script>
</body>
</html>
