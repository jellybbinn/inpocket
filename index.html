<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>inpocket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:'Bebas Neue', sans-serif;
    padding:20px 0;
  }
  h1 {
    font-size:clamp(2.5rem,10vw,5rem);
    letter-spacing:0.15em;
    background:linear-gradient(180deg,#e8e8e8 0%,#a0a0a0 30%,#d0d0d0 50%,#707070 70%,#c0c0c0 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 2px 8px rgba(0,0,0,0.8));
    margin-bottom:8px;
  }
  .sub {
    color:#444; font-size:0.7rem; letter-spacing:0.25em;
    font-family:sans-serif; margin-bottom:20px;
  }
  .stage {
    position:relative;
    width:min(420px, 92vw);
  }
  /* 이미지들이 중앙에 정렬되도록 컨테이너 설정 */
  .img-container {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .stage img.bg {
    width:100%; display:block; pointer-events:none;
  }
  /* 절대 위치 기준을 컨테이너 중앙으로 변경 */
  #resultImg {
    position:absolute; 
    top: 50%; 
    left: 50%;
    transform: translate(-50%, -50%);
    width:100%; height:100%;
    z-index:1; display:none;
    object-fit: contain; /* 이미지 비율 깨짐 방지 */
  }
  .loading {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    color:#888; font-size:0.9rem; letter-spacing:0.15em;
    font-family:sans-serif; display:none; z-index:5;
  }
  .buttons {
    display:flex; gap:10px; margin-top:20px;
    flex-wrap:wrap; justify-content:center;
  }
  .btn {
    padding:13px 28px; font-family:'Bebas Neue',sans-serif;
    font-size:1rem; letter-spacing:0.15em;
    cursor:pointer; border:none; transition:opacity 0.2s;
  }
  .btn:hover { opacity:0.85; }
  .btn-upload { background:linear-gradient(180deg,#d0d0d0,#808080); color:#111; }
  .btn-save, .btn-reset {
    background:transparent; border:1px solid #555; color:#aaa; display:none;
  }
  #fileInput { display:none; }
  /* 숨겨진 img 태그들 - canvas용 */
  #hiddenOverlay, #hiddenUser { display:none; }
</style>
</head>
<body>

<h1>INPOCKET</h1>
<p class="sub">DROP YOUR PHOTO INTO THE SCREEN</p>

<!-- canvas 합성용 숨긴 이미지들 -->
<img id="hiddenOverlay" src="상단_뷰.png">
<img id="hiddenUser" src="" crossorigin="anonymous">

<div class="stage">
  <div style="position: relative; width: 100%; display: flex; justify-content: center; align-items: center;">
    <img class="bg" src="상단_뷰.png">    <img id="resultImg" src="">
  </div>
  <div class="loading" id="loading">LOADING...</div>
</div>

<input type="file" id="fileInput" accept="image/*">
<div class="buttons">
  <button class="btn btn-upload" id="uploadBtn">+ 사진 선택</button>
  <button class="btn btn-save" id="saveBtn">저장하기</button>
  <button class="btn btn-reset" id="resetBtn">초기화</button>
</div>

<script>
const OW=896, OH=1198;
const SCREEN={x:356, y:433, w:213, h:318};

const fileInput   = document.getElementById('fileInput');
const uploadBtn   = document.getElementById('uploadBtn');
const saveBtn     = document.getElementById('saveBtn');
const resetBtn    = document.getElementById('resetBtn');
const resultImg   = document.getElementById('resultImg');
const loading     = document.getElementById('loading');
const hiddenUser  = document.getElementById('hiddenUser');
const hiddenOverlay = document.getElementById('hiddenOverlay');

uploadBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  loading.style.display = 'block';
  uploadBtn.disabled = true;

  const reader = new FileReader();
  reader.onload = ev => {
    hiddenUser.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = OW;
      canvas.height = OH;
      const ctx = canvas.getContext('2d');

    // 업로드 이미지가 실제로 들어가는 전체 영역
    // 세로값을 길게 잡아서 사진이 주머니 안쪽까지 이어지게 함
      const FS = {x:352, y:428, w:226, h:560};

    // 실제로 투명 처리해서 화면처럼 보이게 할 영역
    // 주머니 입구 아래쪽은 뚫지 않음
      const CUT = {x:352, y:428, w:226, h:318};

      // 1. 오버레이를 임시 캔버스에 그린 뒤 화면 영역 색상을 픽셀 키잉으로 투명화
      const tmp = document.createElement('canvas');
      tmp.width = OW; tmp.height = OH;
      const tc = tmp.getContext('2d');
      tc.drawImage(hiddenOverlay, 0, 0, OW, OH);

      // 화면 중앙 상단 픽셀로 키 색상 자동 감지 (손이 없는 안전 영역)
      const kp = tc.getImageData(Math.round(FS.x + FS.w * 0.5), Math.round(FS.y + FS.h * 0.15), 1, 1).data;
      const [kR, kG, kB] = [kp[0], kp[1], kp[2]];

      // FS 영역 내에서만 키 색상과 유사한 픽셀을 투명 처리
      const idata = tc.getImageData(0, 0, OW, OH);
      const px = idata.data;
      const thr = 30;
     for (let y = CUT.y; y < CUT.y + CUT.h; y++) {
        for (let x = CUT.x; x < CUT.x + CUT.w; x++) {
          const i = (y * OW + x) * 4;
          if (Math.abs(px[i]-kR) < thr && Math.abs(px[i+1]-kG) < thr && Math.abs(px[i+2]-kB) < thr) {
            px[i+3] = 0;
          }
        }
      }
      tc.putImageData(idata, 0, 0);

      // 2. 사용자 사진을 FS 영역에 클리핑 후 cover fit으로 그리기
      // (클리핑 없으면 세로 긴 사진이 주머니 아래로 삐져나옴)
     const pa = hiddenUser.naturalWidth / hiddenUser.naturalHeight;
      const fa = FS.w / FS.h;

      let dw, dh, dx, dy;

      // cover 방식: FS 영역을 꽉 채우고 넘치는 부분은 clip으로 자름
      if (pa > fa) {
        // 사진이 FS보다 가로가 넓음 → 세로 맞춤, 가로 crop
        dh = FS.h;
        dw = dh * pa;
        dx = FS.x + (FS.w - dw) / 2;
        dy = FS.y;
      } else {
        // 사진이 FS보다 세로가 긺 → 가로 맞춤, 세로 crop
        dw = FS.w;
        dh = dw / pa;
        dx = FS.x;
        dy = FS.y + (FS.h - dh) / 2;
      }
      ctx.save();
      ctx.beginPath();
      ctx.rect(FS.x, FS.y, FS.w, FS.h);
      ctx.clip();
      ctx.drawImage(hiddenUser, dx, dy, dw, dh);
      ctx.restore();

      // 3. 처리된 오버레이를 위에 덮기 (프레임/손/주머니가 사진 위에 자연스럽게 올라옴)
      ctx.drawImage(tmp, 0, 0);

      const dataURL = canvas.toDataURL('image/png');
      resultImg.src = dataURL;
      resultImg.style.display = 'block';
      loading.style.display = 'none';
      uploadBtn.disabled = false;
      saveBtn.style.display = 'block';
      resetBtn.style.display = 'block';
      saveBtn.dataset.url = dataURL;
    };
    hiddenUser.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  this.value = '';
});

saveBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'inpocket.png';
  link.href = saveBtn.dataset.url;
  link.click();
});

resetBtn.addEventListener('click', () => {
  resultImg.style.display = 'none';
  resultImg.src = '';
  saveBtn.style.display = 'none';
  resetBtn.style.display = 'none';
});
</script>
</body>
</html>
